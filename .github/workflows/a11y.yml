name: Accessibility

on:
  push:
    branches: [develop]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  a11y-storybook:
    name: Storybook a11y audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers for test-runner
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Storybook accessibility tests
        env:
          A11Y_FAIL_LEVEL: none
        run: pnpm a11y:storybook

      - name: Upload Storybook a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-a11y-report
          path: reports/a11y/storybook-a11y.json
          if-no-files-found: warn

  a11y-e2e:
    name: E2E a11y audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build

      - name: Run Playwright with accessibility audits
        env:
          A11Y_ENABLED: 'true'
          A11Y_FAIL_LEVEL: none
        run: xvfb-run --auto-servernum -- pnpm exec playwright test

      - name: Upload E2E a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-a11y-report
          path: reports/a11y/e2e-a11y.json
          if-no-files-found: warn

  a11y-report:
    name: Publish a11y summary
    runs-on: ubuntu-latest
    needs: [a11y-storybook, a11y-e2e]
    if: always()
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download Storybook a11y report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: storybook-a11y-report
          path: reports/a11y/

      - name: Download E2E a11y report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: e2e-a11y-report
          path: reports/a11y/

      - name: Build consolidated summary
        run: node scripts/a11y-report.mjs

      - name: Upload consolidated summary
        uses: actions/upload-artifact@v4
        with:
          name: a11y-summary
          path: |
            reports/a11y/summary.md
            reports/a11y/summary.json
          if-no-files-found: warn

      - name: Post sticky a11y comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('reports/a11y/summary.md')) {
              console.log('No a11y summary to publish.');
              return;
            }
            const body = fs.readFileSync('reports/a11y/summary.md', 'utf8');
            const marker = '<!-- a11y-report -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
