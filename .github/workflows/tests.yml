name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!docs/**'
            docs:
              - 'docs/**'

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm compile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Generate coverage markdown
        if: always()
        run: node scripts/coverage-markdown.mjs > coverage/coverage.md

      - name: Publish coverage to job summary
        if: always()
        run: cat coverage/coverage.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post sticky coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage/coverage.md', 'utf8');
            const marker = '<!-- coverage-sticky-comment -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

      - name: Upload CTRF report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: unit-ctrf-report
          path: ctrf/unit-ctrf-report.json

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: coverage-summary
          path: coverage/coverage-summary.json

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Run ESLint with CTRF reporter
        continue-on-error: true
        run: pnpm lint:ctrf

      - name: Upload lint CTRF report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: lint-ctrf-report
          path: ctrf/lint-ctrf-report.json

  e2e-tests:
    name: E2E Tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      SHARD_INDEX: ${{ matrix.shard }}
      A11Y_ENABLED: 'true'
      A11Y_FAIL_LEVEL: none
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- pnpm exec playwright test --shard=${{ matrix.shard }}/3

      - name: Upload CTRF report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: e2e-ctrf-report-shard-${{ matrix.shard }}
          path: ctrf/e2e-ctrf-report-shard-${{ matrix.shard }}.json

      - name: Upload E2E a11y report (shard ${{ matrix.shard }})
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: e2e-a11y-shard-${{ matrix.shard }}
          path: reports/a11y/e2e-a11y.json
          if-no-files-found: warn

  a11y-storybook:
    name: Storybook a11y audit
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium

      - name: Run Storybook accessibility tests
        continue-on-error: true
        env:
          A11Y_FAIL_LEVEL: none
        run: pnpm a11y:storybook:run

      - name: Consolidate Storybook a11y shards
        if: always()
        env:
          A11Y_FAIL_LEVEL: none
        run: pnpm a11y:storybook:consolidate

      - name: Upload Storybook a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-a11y-report
          path: reports/a11y/storybook-a11y.json
          if-no-files-found: warn

  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [changes, unit-tests, e2e-tests, a11y-storybook, lint]
    if: always() && (needs.changes.outputs.code == 'true' || github.event_name == 'push')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download unit test report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: unit-ctrf-report
          path: ctrf/

      - name: Download E2E shard reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-ctrf-report-shard-*
          path: ctrf/
          merge-multiple: true

      - name: Merge E2E CTRF shard reports
        run: |
          node -e "
          const fs = require('fs');
          const files = fs.readdirSync('ctrf').filter(f => /^e2e-ctrf-report-shard-\d+\.json$/.test(f));
          if (!files.length) { console.log('No shard reports found'); process.exit(0); }
          const reports = files.map(f => JSON.parse(fs.readFileSync('ctrf/' + f, 'utf8')));
          const merged = JSON.parse(JSON.stringify(reports[0]));
          for (let i = 1; i < reports.length; i++) {
            const r = reports[i];
            merged.results.tests.push(...r.results.tests);
            ['tests','passed','failed','pending','skipped','other'].forEach(k => {
              merged.results.summary[k] = (merged.results.summary[k] || 0) + (r.results.summary[k] || 0);
            });
            if (r.results.summary.start) merged.results.summary.start = Math.min(merged.results.summary.start, r.results.summary.start);
            if (r.results.summary.stop) merged.results.summary.stop = Math.max(merged.results.summary.stop, r.results.summary.stop);
          }
          fs.writeFileSync('ctrf/e2e-ctrf-report.json', JSON.stringify(merged, null, 2));
          console.log('Merged', files.length, 'shard reports ->', merged.results.summary.tests, 'tests');
          "
        continue-on-error: true

      - name: Publish unit test CTRF results
        uses: ctrf-io/github-actions-ctrf@v1
        if: always()
        with:
          report-path: 'ctrf/unit-ctrf-report.json'
          pull-request: true
          summary: false
          summary-report: true
          failed-report: true
          flaky-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish E2E CTRF results
        uses: ctrf-io/github-actions-ctrf@v1
        if: always()
        with:
          report-path: 'ctrf/e2e-ctrf-report.json'
          pull-request: true
          summary: false
          summary-report: true
          failed-report: true
          flaky-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download lint CTRF report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lint-ctrf-report
          path: ctrf/

      - name: Publish lint CTRF results
        uses: ctrf-io/github-actions-ctrf@v1
        if: always()
        continue-on-error: true
        with:
          report-path: 'ctrf/lint-ctrf-report.json'
          pull-request: true
          summary: false
          summary-report: true
          failed-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Accessibility pipeline ────────────────────────────────────────────
      - name: Download Storybook a11y report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: storybook-a11y-report
          path: reports/a11y/

      - name: Download E2E a11y shard reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: e2e-a11y-shard-*
          path: reports/a11y/shards/
          merge-multiple: false

      - name: Merge E2E a11y shard reports
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const base = 'reports/a11y/shards';
          if (!fs.existsSync(base)) { console.log('No a11y shard reports'); process.exit(0); }
          const scenarios = [];
          const summary = { critical: 0, serious: 0, moderate: 0, minor: 0 };
          for (const dir of fs.readdirSync(base)) {
            const p = path.join(base, dir, 'e2e-a11y.json');
            if (!fs.existsSync(p)) continue;
            const r = JSON.parse(fs.readFileSync(p, 'utf8'));
            if (Array.isArray(r.scenarios)) scenarios.push(...r.scenarios);
            if (r.summary) for (const k of Object.keys(summary)) summary[k] += r.summary[k] || 0;
          }
          fs.mkdirSync('reports/a11y', { recursive: true });
          fs.writeFileSync('reports/a11y/e2e-a11y.json', JSON.stringify({ scenarios, summary }, null, 2));
          console.log('Merged', scenarios.length, 'a11y scenario(s) across shards.');
          "
        continue-on-error: true

      - name: Build consolidated a11y summary
        run: node scripts/a11y-report.mjs
        continue-on-error: true

      - name: Upload consolidated a11y summary
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: a11y-summary
          path: |
            reports/a11y/summary.md
            reports/a11y/summary.json
          if-no-files-found: warn

      - name: Post sticky a11y comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('reports/a11y/summary.md')) {
              console.log('No a11y summary to publish.');
              return;
            }
            const body = fs.readFileSync('reports/a11y/summary.md', 'utf8');
            const marker = '<!-- a11y-report -->';
            const fullBody = `${marker}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install docs dependencies
        working-directory: docs
        run: pnpm install --frozen-lockfile

      - name: Build Astro docs
        working-directory: docs
        run: pnpm build
