name: Tests

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Upload CTRF report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: unit-ctrf-report
          path: ctrf/unit-ctrf-report.json

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install xvfb
        run: sudo apt-get install -y xvfb

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm build

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum -- pnpm exec playwright test

      - name: Upload CTRF report
        uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: e2e-ctrf-report
          path: ctrf/e2e-ctrf-report.json

  report:
    name: Publish Test Reports
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: always()
    steps:
      - name: Download unit test report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: unit-ctrf-report
          path: ctrf/

      - name: Download E2E report
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: e2e-ctrf-report
          path: ctrf/

      - name: Publish unit test CTRF results
        uses: ctrf-io/github-actions-ctrf@v1
        if: always()
        with:
          report-path: 'ctrf/unit-ctrf-report.json'
          pull-request: true
          summary: false
          summary-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish E2E CTRF results
        uses: ctrf-io/github-actions-ctrf@v1
        if: always()
        with:
          report-path: 'ctrf/e2e-ctrf-report.json'
          pull-request: true
          summary: false
          summary-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
